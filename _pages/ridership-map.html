layout: none
permalink: /ridership-map/
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/dist/index.css">
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">

  <div class="toolbar-walk">
    <label id="walkTimeLabel" for="walkTimeInput" class="fw-bold form-label mb-0">Walk Distance (10 minutes)</label>
    <input id="walkTimeInput" type="range" class="form-range mb-0 walk-slider" min="1" max="20" value="10">
  </div>

  <div class="d-flex gap-2 flex-wrap">

    <div hidden>
      <button id="vizTypeScatterplot"></button>
      <button id="vizTypeHeatmap"></button>
    </div>

    <div class="dropdown">
      <button class="btn btn-outline-primary dropdown-toggle btn-sm" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        Service Change
      </button>
      <div class="dropdown-menu shadow-sm py-0">
        <button class="dropdown-item" id="datasetSpring2024">Spring 2024</button>
        <button class="dropdown-item active" id="datasetFall2024">Fall 2024</button>
      </div>
    </div>

    <div class="dropdown">
      <button class="btn btn-outline-primary dropdown-toggle btn-sm" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
        Metric
      </button>
      <div class="dropdown-menu shadow-sm py-0">
        <button class="dropdown-item active" id="metricTotal">Total Per Day</button>
        <button class="dropdown-item" id="metricPerBus">Average Per Bus</button>
      </div>
    </div>

    <div class="dropdown">
      <button class="btn btn-outline-primary dropdown-toggle btn-sm" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
        Time Period
      </button>
      <div class="dropdown-menu shadow-sm p-2">
        <div class="form-check"><input class="form-check-input" type="checkbox" id="tpAM" checked><label class="form-check-label" for="tpAM">Morning Peak</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="tpMID" checked><label class="form-check-label" for="tpMID">Daytime</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="tpPM" checked><label class="form-check-label" for="tpPM">Afternoon Peak</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="tpXEV" checked><label class="form-check-label" for="tpXEV">Evening</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="tpXNT" checked><label class="form-check-label" for="tpXNT">Night</label></div>
      </div>
    </div>

    <div class="dropdown">
      <button class="btn btn-outline-primary dropdown-toggle btn-sm" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
        Ridership Type
      </button>
      <div class="dropdown-menu shadow-sm p-2">
        <div class="form-check"><input class="form-check-input" type="checkbox" id="rtBoardings" checked><label class="form-check-label" for="rtBoardings">Boardings</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="rtAlightings"><label class="form-check-label" for="rtAlightings">Alightings</label></div>
      </div>
    </div>

    <div class="dropdown">
      <button class="btn btn-outline-primary dropdown-toggle btn-sm" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
        Select Routes
      </button>
      <div class="dropdown-menu shadow-sm py-0 route-dropdown-menu" id="routeDropdown">
        <div class="d-flex">
          <button id="routeAll" class="w-50 btn btn-outline-secondary btn-sm no-radius">All</button>
          <button id="routeNone" class="w-50 btn btn-outline-secondary btn-sm no-radius">None</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Map container — fullscreened as a unit with the charts panel -->
<div id="map-container">
  <div id="map"></div>

  <!-- Charts panel — overlays the map bottom, slides open on toggle -->
  <div class="charts-panel" id="chartsPanel">
    <button class="charts-close-btn" id="chartsCloseBtn" title="Close">✕</button>
    <div class="charts-body">
      <div class="stats-panel">
        <div class="stat-capsule">
          <span class="stat-value" id="statRidership">—</span>
          <span class="stat-label">Daily Ridership</span>
        </div>
        <div class="stat-capsule">
          <span class="stat-value" id="statPerBus">—</span>
          <span class="stat-label">Ridership Per Bus</span>
        </div>
        <div class="stat-capsule">
          <span class="stat-value" id="statStops">—</span>
          <span class="stat-label">Stops</span>
        </div>
        <div class="stat-capsule">
          <span class="stat-value" id="statRoutes">—</span>
          <span class="stat-label">Routes</span>
        </div>
      </div>
      <div class="chart-pane">
        <div id="viz1"></div>
      </div>
      <div class="chart-pane">
        <div id="viz2"></div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/assets/dist/index.js"></script>
<script>
  document.getElementById('chartsCloseBtn').addEventListener('click', () => {
    document.getElementById('chartsPanel').classList.remove('open');
    document.getElementById('map-container').classList.remove('charts-open');
  });
</script>


</body>
</html>
