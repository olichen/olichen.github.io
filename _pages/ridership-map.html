<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/dist/index.css">
</head>
<body>

<!-- Map container — fullscreened as a unit with the toolbar and charts panels -->
<div id="map-container" class="toolbar-open">

  <!-- Toolbar panel — overlays the map top, open by default -->
  <div class="toolbar-panel open" id="toolbarPanel">
    <div class="toolbar" id="toolbar">

      <div class="tb-group">
        <span class="tb-label">Walk</span>
        <div class="walk-group">
          <input type="range" id="walkTimeInput" min="1" max="20" value="10">
          <span class="walk-val" id="walkTimeLabel">10 min</span>
        </div>
        <div class="tb-sep"></div>
      </div>

      <div class="tb-group">
        <span class="tb-label">View</span>
        <div class="seg-control">
          <button class="seg-btn active" id="vizTypeScatterplot">Scatterplot</button>
          <button class="seg-btn" id="vizTypeHeatmap">Heatmap</button>
        </div>
        <div class="tb-sep"></div>
      </div>

      <div class="tb-group">
        <span class="tb-label">Service</span>
        <div class="svc-dropdown" id="svcDropdown">
          <div class="svc-trigger" id="svcTrigger">
            <span id="svcLabel">Fall 2024</span>
            <svg class="tb-chevron" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="svc-panel" id="svcPanel">
            <div class="svc-option selected" data-value="fall2024">
              <svg class="svc-check" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Fall 2024
            </div>
            <div class="svc-option" data-value="spring2024">
              <svg class="svc-check" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Spring 2024
            </div>
          </div>
        </div>
        <div class="tb-sep"></div>
      </div>

      <div class="tb-group">
        <span class="tb-label">Metric</span>
        <div class="seg-control">
          <button class="seg-btn active" id="metricTotal">Riders / Day</button>
          <button class="seg-btn" id="metricPerBus">Riders / Bus</button>
        </div>
        <div class="tb-sep"></div>
      </div>

      <div class="tb-group">
        <span class="tb-label">Time</span>
        <div class="pill-shelf">
          <span class="pill active" id="tpAM" title="5 AM to 9 AM">AM Peak</span>
          <span class="pill active" id="tpMID" title="9 AM to 3 PM">Daytime</span>
          <span class="pill active" id="tpPM" title="3 PM to 7 PM">PM Peak</span>
          <span class="pill active" id="tpXEV" title="7 PM to 10 PM">Evening</span>
          <span class="pill active" id="tpXNT" title="10 PM to 5 AM">Night</span>
        </div>
        <div class="tb-sep"></div>
      </div>

      <div class="tb-group">
        <span class="tb-label">Ridership</span>
        <div class="pill-shelf">
          <span class="pill active" id="rtBoardings">Boardings</span>
          <span class="pill" id="rtAlightings">Alightings</span>
        </div>
        <div class="tb-sep"></div>
      </div>

      <div class="tb-group">
        <span class="tb-label">Routes</span>
        <div class="rt-dropdown" id="rtDropdown">
          <div class="rt-trigger" id="rtTrigger">
            <span id="rtCount" class="rt-trigger-count">All</span> routes
            <svg class="tb-chevron" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="rt-panel" id="rtPanel">
            <div class="rt-search-wrap">
              <input class="rt-search" id="rtSearch" type="text" placeholder="Search routes…">
              <span class="rt-search-clear" id="rtSearchClear">✕</span>
            </div>
            <div class="rt-actions">
              <span class="text-btn" id="routeAll" title="Toggle all routes">All</span>
              <span class="text-btn" id="routeFrequent" title="Frequent (≤15 min headway)">Freq.</span>
              <span class="text-btn" id="routeLocal" title="Local (15-30 min headway)">Local</span>
              <span class="text-btn" id="routeAllDay" title="All-Day (30-60 min headway)">All-Day</span>
            </div>
            <div class="rt-list" id="routeList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <!-- Charts panel — overlays the map bottom, slides open on toggle -->
  <div class="charts-panel" id="chartsPanel">
    <button class="charts-close-btn" id="chartsCloseBtn" title="Close">✕</button>
    <div class="charts-body">
      <div class="stats-panel">
        <div class="stat-capsule">
          <span class="stat-value" id="statRidership">—</span>
          <span class="stat-label">Daily Ridership</span>
        </div>
        <div class="stat-capsule">
          <span class="stat-value" id="statPerBus">—</span>
          <span class="stat-label">Ridership Per Bus</span>
        </div>
        <div class="stat-capsule">
          <span class="stat-value" id="statStops">—</span>
          <span class="stat-label">Stops</span>
        </div>
        <div class="stat-capsule">
          <span class="stat-value" id="statRoutes">—</span>
          <span class="stat-label">Routes</span>
        </div>
      </div>
      <div class="chart-pane">
        <div id="chart1" class="chart"></div>
      </div>
      <div class="chart-pane">
        <div id="chart2" class="chart"></div>
      </div>
      <div class="charts-panel-filler"></div>
    </div>
  </div>

</div>

<script type="module" src="/assets/dist/index.js"></script>

</body>
</html>
